name: Build Windows EXE

# 触发条件:
#   1. push 到 main / master 分支时自动跑
#   2. 手动在 Actions 页面点 "Run workflow" 也行
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # 微软托管的 Windows runner(免费)

    env:
      CI: 1  # 让 build_windows.bat 进入静默模式(不 pause)

    steps:
      - name: 检出代码(.gitattributes 会把 BAT 转 CRLF)
        uses: actions/checkout@v7

      - name: 设置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 跑打包脚本(全量日志落盘,失败不阻断)
        shell: cmd
        continue-on-error: true
        run: |
          if not exist logs mkdir logs
          build_windows.bat > logs\build.log 2>&1
          echo ---EXIT CODE: %ERRORLEVEL%--- >> logs\build.log
          echo ---WORKING DIR: %CD%--- >> logs\build.log
          echo ---FILES:--- >> logs\build.log
          dir /s >> logs\build.log
          type logs\build.log

      - name: 上传 .exe(始终上传,即便上一步失败)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: 订单匹配工具-Windows
          path: dist/订单匹配工具.exe
          if-no-files-found: warn
          retention-days: 30

      - name: 上传完整日志(失败排查用,必传)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: logs/build.log
          if-no-files-found: error
          retention-days: 7